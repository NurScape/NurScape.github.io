<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Nurscape Academy</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="admin-body">
  <main class="admin-layout">
    <aside class="admin-sidebar">
      <a class="brand" href="index.html">
        <span class="brand-mark">Nurscape</span>
        <span class="brand-sub">Academy</span>
      </a>
      <nav class="admin-tabs" aria-label="Sections admin">
        <button class="admin-tab active" data-panel="homePanel" type="button"><i class="fa-solid fa-house"></i> Accueil</button>
        <button class="admin-tab" data-panel="coursesPanel" type="button"><i class="fa-solid fa-book-medical"></i> Cours</button>
        <button class="admin-tab" data-panel="resourcesPanel" type="button"><i class="fa-solid fa-folder-open"></i> Ressources</button>
        <button class="admin-tab" data-panel="quizzesPanel" type="button"><i class="fa-solid fa-circle-question"></i> Quiz</button>
      </nav>
      <a class="btn btn-outline" href="index.html">Voir le site</a>
      <button class="btn btn-primary" id="logoutBtn" type="button" hidden>Déconnexion</button>
    </aside>

    <section class="admin-main">
      <div class="admin-topbar">
        <div>
          <p class="eyebrow">Espace admin</p>
          <h1>Gestion du contenu</h1>
        </div>
        <span class="status-pill" id="connectionStatus">Mode aperçu</span>
      </div>

      <section class="login-card" id="loginCard">
        <h2>Connexion administrateur</h2>
        <p>Connectez Supabase dans <code>assets/js/config.js</code>, puis utilisez votre compte admin.</p>
        <form id="loginForm" class="form-grid">
          <label>Email <input name="email" type="email" required></label>
          <label>Mot de passe <input name="password" type="password" required></label>
          <button class="btn btn-primary" type="submit">Se connecter</button>
          <span class="form-note" id="loginNote"></span>
        </form>
      </section>

      <section class="admin-panel active" id="homePanel">
        <div class="panel-head">
          <h2>Page d'accueil</h2>
          <button class="btn btn-primary" form="homeForm" type="submit">Enregistrer</button>
        </div>
        <form class="editor-card form-grid" id="homeForm">
          <label>Titre hero <input name="hero_title" required></label>
          <label>Sous-titre hero <textarea name="hero_subtitle" rows="3" required></textarea></label>
          <label>Libellé bouton principal <input name="primary_label"></label>
          <label>Lien bouton principal <input name="primary_href"></label>
          <label>Libellé bouton secondaire <input name="secondary_label"></label>
          <label>Lien bouton secondaire <input name="secondary_href"></label>
          <label>Image hero URL <input name="hero_image_url"></label>
          <label>Importer image hero <input name="hero_image_file" type="file" accept="image/*"></label>
          <label>Titre à propos <input name="about_title"></label>
          <label>Texte à propos <textarea name="about_text" rows="4"></textarea></label>
          <label>Image à propos URL <input name="about_image_url"></label>
          <label>Importer image à propos <input name="about_image_file" type="file" accept="image/*"></label>
        </form>
      </section>

      <section class="admin-panel" id="coursesPanel">
        <div class="panel-head">
          <h2>Cours</h2>
          <button class="btn btn-primary" form="courseForm" type="submit">Ajouter / modifier</button>
        </div>
        <form class="editor-card form-grid" id="courseForm">
          <input name="id" type="hidden">
          <label>Titre <input name="title" required></label>
          <label>Catégorie
            <select name="category" required>
              <option value="clinique">Clinique</option>
              <option value="soins">Soins</option>
              <option value="sante">Santé publique</option>
            </select>
          </label>
          <label>Icône Font Awesome <input name="icon" placeholder="fa-brain" required></label>
          <label>Description <textarea name="description" rows="3" required></textarea></label>
          <label>Ordre <input name="sort_order" type="number" value="1"></label>
          <label class="switch"><input name="is_published" type="checkbox" checked> Publié</label>
        </form>
        <div class="admin-list" id="courseList"></div>
      </section>

      <section class="admin-panel" id="resourcesPanel">
        <div class="panel-head">
          <h2>Ressources</h2>
          <button class="btn btn-primary" form="resourceForm" type="submit">Ajouter / modifier</button>
        </div>
        <form class="editor-card form-grid" id="resourceForm">
          <input name="id" type="hidden">
          <label>Titre <input name="title" required></label>
          <label>Type
            <select name="type" required>
              <option value="video">Vidéo</option>
              <option value="infographic">Infographie</option>
              <option value="pdf">PDF</option>
              <option value="quiz">Quiz</option>
            </select>
          </label>
          <label>Sujet <input name="subject"></label>
          <label>Lien ou fichier public <input name="url" placeholder="https://... ou URL Supabase Storage"></label>
          <label>Importer fichier <input name="upload_file" type="file" accept="image/*,application/pdf,video/*"></label>
          <label>Description <textarea name="description" rows="3"></textarea></label>
          <label>Ordre <input name="sort_order" type="number" value="1"></label>
          <label class="switch"><input name="is_published" type="checkbox" checked> Publié</label>
        </form>
        <div class="admin-list" id="resourceList"></div>
      </section>

      <section class="admin-panel" id="quizzesPanel">
        <div class="panel-head">
          <h2>Quiz</h2>
          <button class="btn btn-primary" form="quizForm" type="submit">Ajouter / modifier</button>
        </div>
        <form class="editor-card form-grid" id="quizForm">
          <input name="id" type="hidden">
          <label>Question <textarea name="question" rows="3" required></textarea></label>
          <label>Réponses, une par ligne <textarea name="answers" rows="5" required></textarea></label>
          <label>Réponse correcte <input name="correct_answer" required></label>
          <label>Explication <textarea name="explanation" rows="3"></textarea></label>
          <label>Ordre <input name="sort_order" type="number" value="1"></label>
          <label class="switch"><input name="is_published" type="checkbox" checked> Publié</label>
        </form>
        <div class="admin-list" id="quizList"></div>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
